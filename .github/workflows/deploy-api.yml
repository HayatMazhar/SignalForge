name: Build and Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'src/SignalForge.API/**'
      - 'src/SignalForge.Application/**'
      - 'src/SignalForge.Domain/**'
      - 'src/SignalForge.Infrastructure/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/signalforge-api:${{ github.sha }},${{ secrets.ACR_LOGIN_SERVER }}/signalforge-api:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container App
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name signalforge-api \
              --resource-group SignalForge-RG \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/signalforge-api:${{ github.sha }} \
              --set-env-vars \
                "TextAnalytics__Endpoint=${{ secrets.TEXT_ANALYTICS_ENDPOINT }}" \
                "TextAnalytics__ApiKey=${{ secrets.TEXT_ANALYTICS_KEY }}" \
                "AzureSearch__Endpoint=${{ secrets.AZURE_SEARCH_ENDPOINT }}" \
                "AzureSearch__ApiKey=${{ secrets.AZURE_SEARCH_KEY }}" \
                "Speech__ApiKey=${{ secrets.SPEECH_KEY }}" \
                "Speech__Region=swedencentral" \
                "ContentSafety__Endpoint=${{ secrets.CONTENT_SAFETY_ENDPOINT }}" \
                "ContentSafety__ApiKey=${{ secrets.CONTENT_SAFETY_KEY }}" \
                "Translator__ApiKey=${{ secrets.TRANSLATOR_KEY }}" \
                "Translator__Region=swedencentral"
